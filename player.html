<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEATDEX | Record Profile</title>
    <style>
        :root {
            --bg-main: #060608;
            --bg-card: #0d0d11;
            --accent: #ffe600;
            --text-main: #ffffff;
            --text-muted: #6c6c7a;
            --border: #1a1a24;
            --status-ban: #ff3b3b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .back-btn {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 8px;
            align-self: flex-start;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #111116;
        }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px;
            position: relative;
        }

        .badge-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .badge {
            background: #15151f;
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .badge.danger {
            background: rgba(255, 59, 59, 0.1);
            color: var(--status-ban);
            border-color: rgba(255, 59, 59, 0.2);
            font-weight: 600;
        }

        .username {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-val {
            font-size: 15px;
            font-weight: 600;
        }

        .section-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
        }

        .section-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-body {
            font-size: 15px;
            line-height: 1.6;
            color: #e1e1e6;
        }

        .video-box-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: #000000;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid var(--border);
            min-height: 300px;
        }

        .video-box-container iframe {
            max-width: 100% !important;
            width: 100% !important;
            border: none !important;
            box-shadow: none !important;
        }

        .loading-text {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <a href="index.html" class="back-btn">Back to Registry</a>
        
        <div class="profile-card">
            <div class="loading-text">Loading structured record metadata...</div>
        </div>
    </div>

    <script async src="https://telegram.org/js/telegram-widget.js?22"></script>

    <script>
        const REPO_PATH = "xaxaxaxac/trackingwebsite"; 

        function getQueryParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        async function loadPlayer() {
            const recordId = getQueryParam("id");
            const container = document.getElementById("mainContainer");

            if (!recordId) {
                container.innerHTML = `<div class="profile-card"><div class="loading-text" style="color:var(--status-ban);">Error: Record ID parameter missing from URL.</div></div>`;
                return;
            }

            const cacheBuster = Math.random().toString(36).substring(2, 15);
            const dbUrl = `https://raw.githubusercontent.com/${REPO_PATH}/main/database.json?v=${cacheBuster}`;

            try {
                const response = await fetch(dbUrl);
                if (!response.ok) throw new Error("Read error");
                const db = await response.json();
                const record = db[recordId];

                if (!record) {
                    container.innerHTML = `<a href="index.html" class="back-btn">Back to Registry</a><div class="profile-card"><div class="loading-text" style="color:var(--status-ban);">RECORD EXPIRED OR NOT FOUND INSIDE DATABASE REGISTRY.</div></div>`;
                    return;
                }

                let tgPostRoute = "";
                if (record.video_url) {
                    const cleanUrl = record.video_url.split('?')[0];
                    const parts = cleanUrl.split('t.me/');
                    if (parts.length > 1) {
                        tgPostRoute = parts[1];
                    }
                }

                container.innerHTML = `
                    <a href="index.html" class="back-btn">Back to Registry</a>
                    
                    <div class="profile-card">
                        <div class="badge-row">
                            <div class="badge">#${recordId.substring(0,8)}</div>
                            <div class="badge danger">Banned</div>
                        </div>
                        <div class="username">${record.roblox_id || 'Unknown ID'}</div>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Platform</div>
                                <div class="info-val">Roblox</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Date and Time</div>
                                <div class="info-val">${record.date || 'Unknown'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Moderator</div>
                                <div class="info-val" style="color: var(--accent);">@${record.discord_name || 'System'}</div>
                            </div>
                        </div>
                    </div>

                    <div class="section-box">
                        <div class="section-title">Violation Description</div>
                        <div class="section-body">${record.reason || 'No violation description provided.'}</div>
                    </div>

                    <div class="section-box">
                        <div class="section-title">Evidence Video Stream</div>
                        <div class="video-box-container" id="tgVideoWrapper">
                        </div>
                    </div>
                `;

                if (tgPostRoute) {
                    const scriptTag = document.createElement("script");
                    scriptTag.setAttribute("data-telegram-post", tgPostRoute);
                    scriptTag.setAttribute("data-width", "100%");
                    scriptTag.setAttribute("data-dark", "1");
                    scriptTag.src = "https://telegram.org/js/telegram-widget.js?22";
                    
                    const wrapper = document.getElementById("tgVideoWrapper");
                    wrapper.innerHTML = "";
                    wrapper.appendChild(scriptTag);
                } else {
                    document.getElementById("tgVideoWrapper").innerHTML = `<div class="loading-text">No evidence file associated with this entry.</div>`;
                }

            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="profile-card"><div class="loading-text" style="color:var(--status-ban);">Error established connecting to remote GitHub data stream.</div></div>`;
            }
        }

        window.onload = loadPlayer;
    </script>
</body>
</html>
