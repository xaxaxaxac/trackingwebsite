<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackerClub | Case Profile</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        :root {
            --bg-main: #050507;
            --bg-card: rgba(13, 13, 18, 0.45);
            --accent: #ffe600;
            --text-main: #ffffff;
            --text-muted: #717182;
            --border: rgba(255, 255, 255, 0.04);
            --status-ban: #ff3b3b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-main); background-image: radial-gradient(circle at 50% 10%, rgba(255, 230, 0, 0.01) 0%, transparent 50%); color: var(--text-main); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 24px; opacity: 0; transform: translateY(10px); animation: loadIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes loadIn { to { opacity: 1; transform: translateY(0); } }
        .back-link { color: var(--text-main); text-decoration: none; font-size: 13px; font-weight: 600; background: var(--bg-card); border: 1px solid var(--border); backdrop-filter: blur(12px); padding: 12px 22px; border-radius: 12px; align-self: flex-start; transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.03); }
        .back-link:hover { background: rgba(255, 230, 0, 0.02); border-color: rgba(255, 230, 0, 0.2); box-shadow: 0 0 15px rgba(255, 230, 0, 0.03); }
        .profile-wrapper, .content-card { background: var(--bg-card); border: 1px solid var(--border); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 16px; padding: 36px; box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.04), 0 10px 40px rgba(0, 0, 0, 0.2); }
        .content-card { padding: 28px; }
        .badge-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tag-meta { background: rgba(20, 20, 31, 0.6); border: 1px solid var(--border); padding: 5px 14px; border-radius: 8px; font-size: 12px; color: #a3a3b3; font-family: monospace; }
        .tag-meta.critical { background: rgba(255, 59, 59, 0.08); color: var(--status-ban); border-color: rgba(255, 59, 59, 0.15); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .player-identity { font-size: 42px; font-weight: 800; margin-bottom: 28px; letter-spacing: -1px; }
        .grid-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; border-top: 1px solid var(--border); padding-top: 24px; }
        .meta-block { display: flex; flex-direction: column; gap: 6px; }
        .meta-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        .meta-value { font-size: 15px; font-weight: 600; color: #e1e1e6; }
        .card-header-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-weight: 700; }
        .card-text-body { font-size: 15px; line-height: 1.6; color: #d1d1d6; }
        .video-viewport { width: 100%; background: rgba(0, 0, 0, 0.3); border-radius: 12px; border: 1px solid var(--border); min-height: 200px; display: flex; justify-content: center; align-items: center; padding: 0; overflow: hidden; }
        .native-player { width: 100%; max-height: 480px; display: block; outline: none; background: #000; }
        .system-notice { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>
    <div class="container" id="profileRoot">
        <a href="/leaderboard" class="back-link">← Back to Database</a>
        <div class="profile-wrapper">
            <div class="system-notice">Resolving structural profile parameters...</div>
        </div>
    </div>
    <script>
        const REPO_PATH = "xaxaxaxac/trackingwebsite"; 
        function fetchToken(key) { return new URLSearchParams(window.location.search).get(key); }
        async function loadProfileNode() {
            const targetUid = fetchToken("id");
            const view = document.getElementById("profileRoot");
            if (!targetUid) {
                view.innerHTML = `<div class="profile-wrapper"><div class="system-notice" style="color:var(--status-ban);">Execution halted. Parameter missing.</div></div>`;
                return;
            }
            const salt = Math.random().toString(36).substring(2, 15);
            const targetUrl = `https://raw.githubusercontent.com/${REPO_PATH}/main/database.json?cache=${salt}`;
            try {
                const res = await fetch(targetUrl);
                if (!res.ok) throw new Error();
                const map = await res.json();
                const node = map[targetUid];
                if (!node) {
                    view.innerHTML = `<a href="/leaderboard" class="back-link">← Back to Database</a><div class="profile-wrapper"><div class="system-notice" style="color:var(--status-ban); font-weight:600;">RECORD UNAVAILABLE.</div></div>`;
                    return;
                }
                view.innerHTML = `
                    <a href="/leaderboard" class="back-link">← Back to Database</a>
                    <div class="profile-wrapper">
                        <div class="badge-container">
                            <div class="tag-meta">#${targetUid.toUpperCase()}</div>
                            <div class="tag-meta critical">Banned</div>
                        </div>
                        <div class="player-identity">${node.roblox_id || 'Unknown Terminal'}</div>
                        <div class="grid-meta">
                            <div class="meta-block">
                                <div class="meta-label">Platform</div>
                                <div class="meta-value">Roblox</div>
                            </div>
                            <div class="meta-block">
                                <div class="meta-label">Logged Date</div>
                                <div class="meta-value">${node.date || 'Not Appended'}</div>
                            </div>
                            <div class="meta-block">
                                <div class="meta-label">Authorized Mod</div>
                                <div class="meta-value" style="color: var(--accent);">@${node.discord_name || 'System'}</div>
                            </div>
                        </div>
                    </div>
                    <div class="content-card">
                        <div class="card-header-title">Violation Narrative</div>
                        <div class="card-text-body">${node.reason || 'No descriptive logs compiled.'}</div>
                    </div>
                    <div class="content-card">
                        <div class="card-header-title">Evidence Stream</div>
                        <div class="video-viewport" id="videoContainer">
                            <div class="system-notice">No external telemetry capture attached to record.</div>
                        </div>
                    </div>
                `;
                if (node.video_url) {
                    const videoContainer = document.getElementById("videoContainer");
                    videoContainer.innerHTML = "";
                    const videoElement = document.createElement("video");
                    videoElement.className = "native-player";
                    videoElement.src = node.video_url.trim();
                    videoElement.controls = true;
                    videoElement.preload = "metadata";
                    videoElement.playsInline = true;
                    videoElement.onerror = () => {
                        videoContainer.innerHTML = `<div class="system-notice" style="color:var(--status-ban);">Error: Unable to stream media asset. Verify repository integrity.</div>`;
                    };
                    videoContainer.appendChild(videoElement);
                }
            } catch (err) {
                view.innerHTML = `<div class="profile-wrapper"><div class="system-notice" style="color:var(--status-ban);">Cloud data unobtainable.</div></div>`;
            }
        }
        window.onload = loadProfileNode;
    </script>
</body>
</html>
