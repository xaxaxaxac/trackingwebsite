<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault | Record View</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #111114;
            --accent: #e5b800;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --border: #1f1f24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .vault-container {
            width: 100%;
            max-width: 750px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .meta-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
        }

        .meta-top span {
            color: var(--text-main);
            font-weight: 600;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 16 / 9;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .annotation-block {
            text-align: center;
        }

        .annotation-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .annotation-text {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        .back-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <div style="width: 100%; max-width: 750px; display: flex; flex-direction: column;">
        <a href="index.html" class="back-btn">← Back to Database</a>
        
        <div class="vault-container" id="vaultContainer">
            <div class="meta-top" style="justify-content: center; padding: 20px 0;">
                Loading operational record data...
            </div>
        </div>

        <div class="footer">
            Powered by <span>Vault Security</span>
        </div>
    </div>

    <script>
        const REPO_PATH = "xaxaxaxac/trackingwebsite"; 

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        async function loadRecord() {
            const recordId = getQueryParam("id");
            const container = document.getElementById("vaultContainer");

            if (!recordId) {
                container.innerHTML = `<div class="meta-top" style="color:#ff4444;">Error: No Record ID provided in URL parameters.</div>`;
                return;
            }

            const cacheBuster = Math.random().toString(36).substring(2, 15);
            const dbUrl = `https://raw.githubusercontent.com/${REPO_PATH}/main/database.json?v=${cacheBuster}`;

            try {
                const response = await fetch(dbUrl);
                if (!response.ok) throw new Error("Database file response error");
                const db = await response.json();
                const record = db[recordId];

                if (!record) {
                    container.innerHTML = `<div class="meta-top" style="color:#ff4444;">RECORD EXPIRED OR NOT FOUND INSIDE DATABASE REGISTRY.</div>`;
                    return;
                }

                container.innerHTML = `
                    <div class="meta-top">
                        <div>User: <span>${record.roblox_id || 'Unknown'}</span></div>
                        <div>Uploaded: <span>${record.date || 'Unknown'}</span></div>
                    </div>
                    
                    <div class="video-wrapper">
                        <iframe src="${record.video_url}" allowfullscreen></iframe>
                    </div>
                    
                    <div class="annotation-block">
                        <div class="annotation-title">Annotations</div>
                        <div class="annotation-text">${record.reason || 'No details provided'}</div>
                    </div>

                    <div class="meta-top" style="border-bottom: none; border-top: 1px solid var(--border); padding-top: 14px; padding-bottom: 0; font-size: 11px;">
                        <div>Operator Session: <span>${record.discord_name || 'System'}</span></div>
                        <div>Case ID: <span>${recordId}</span></div>
                    </div>
                `;

            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="meta-top" style="color:#ff4444;">Error established connecting to remote GitHub data stream.</div>`;
            }
        }

        window.onload = loadRecord;
    </script>
</body>
</html>
