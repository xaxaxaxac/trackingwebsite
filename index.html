<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault | Evidence Database</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #111114;
            --accent: #e5b800;
            --accent-hover: #ffcc00;
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --border: #1f1f24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo span {
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 24px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 10px;
        }

        .search-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .database-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 3fr 2fr;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #33333a;
        }

        .player-info .label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .player-info .val {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .reason-info {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.4;
            border-left: 2px solid var(--border);
            padding-left: 15px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .btn {
            background: var(--accent);
            color: #000000;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            transition: background 0.2s;
            text-align: center;
            width: 110px;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .meta-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .status-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            padding: 40px;
        }

        @media (max-width: 640px) {
            .card {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .reason-info {
                border-left: none;
                border-top: 1px solid var(--border);
                padding-left: 0;
                padding-top: 12px;
            }
            .actions {
                align-items: flex-start;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>X</span> Vault</div>
        <div class="subtitle">Secure Anti-Cheat Evidence Registry</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search by Roblox ID...">
    </div>

    <div class="database-container" id="dbContainer">
        <div class="status-msg">Loading database logs...</div>
    </div>

    <script>
        const REPO_PATH = "xaxaxaxac/tracker-db"; 
        const DB_URL = `https://raw.githubusercontent.com/${REPO_PATH}/main/database.json`;
        let databaseData = {};

        async function loadDatabase() {
            const container = document.getElementById("dbContainer");
            try {
                const response = await fetch(DB_URL + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error("File not found");
                databaseData = await response.json();
                renderCards(databaseData);
            } catch (error) {
                container.innerHTML = `<div class="status-msg" style="color: #ff4444;">Error loading database. Make sure database.json exists in your new repository.</div>`;
            }
        }

        function renderCards(data) {
            const container = document.getElementById("dbContainer");
            container.innerHTML = "";
            
            const keys = Object.keys(data).reverse();
            
            if (keys.length === 0) {
                container.innerHTML = `<div class="status-msg">No logs found in database.</div>`;
                return;
            }

            keys.forEach(id => {
                const item = data[id];
                const card = document.createElement("div");
                card.className = "card";
                card.setAttribute("data-roblox", item.roblox_id);
                card.innerHTML = `
                    <div class="player-info">
                        <div class="label">Roblox Target</div>
                        <div class="val">${item.roblox_id}</div>
                    </div>
                    <div class="reason-info">
                        ${item.reason}
                    </div>
                    <div class="actions">
                        <a href="player.html?id=${id}" class="btn">View Proof</a>
                        <div class="meta-date">${item.date || 'Unknown'}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById("searchInput").addEventListener("input", function(e) {
            const query = e.target.value.trim().toLowerCase();
            const cards = document.querySelectorAll(".card");
            cards.forEach(card => {
                const robloxId = card.getAttribute("data-roblox").toLowerCase();
                if (robloxId.includes(query)) {
                    card.style.display = "grid";
                } else {
                    card.style.display = "none";
                }
            });
        });

        window.onload = loadDatabase;
    </script>
</body>
</html>
